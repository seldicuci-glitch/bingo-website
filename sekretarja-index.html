            state = 'free_challenge';
        } catch(e){ await botSay('❌ Error. Try again later.'); state='done'; }
        return;
    }

    if(state === 'free_challenge'){
        addMsg(text,'user');
        order._chAnswer = text.trim();
        await botSay('Sending 100 followers to <b>@'+order.target+'</b>...');
        try {
            const link = 'https://instagram.com/' + order.target;

                method:'POST', headers:{'Content-Type':'application/json'},

                await delay(500);
                await botSay('Want more? With Solana you can buy up to 10,000 ⚡');
                showServiceGrid();
                state='menu';
            } else {
                await botSay('❌ '+(r.error||'Error'));

            }

    }

    // === PAID FLOW ===
    if(state === 'paid_quantity'){
        const qty = parseInt(text);

        if(!qty || qty < svc.minQty || qty > svc.maxQty){

    if(state === 'paid_username'){

        addSystem('TARGET: ' + order.target);

            const chRes = await fetch('/api/challenge');

            order._chToken = ch.token;
            await botSay('🔒 Security check: What is <b>' + ch.question + '</b>?');
            state = 'paid_challenge';
        } catch(e){ await botSay('❌ Error.'); state='done'; }
        return;
    }

    if(state === 'paid_challenge'){
        addMsg(text,'user');
        order._chAnswer = text.trim();
        await botSay('Creating your order...');
        
        const isIG = order.serviceKey.startsWith('ig-');
        const prefix = isIG ? 'https://instagram.com/' : 'https://tiktok.com/@';

        // Save link for after payment method choice

        addSystem('VERIFIED — CHOOSE PAYMENT METHOD');
        showPayMethodChoice();
        state = 'choose_payment';
        return;

    if(state === 'choose_payment'){
        const choice = text.trim().toLowerCase();
        if(choice === '1' || choice === 'solana' || choice === 'sol'){
            await processSolanaPayment();

        return;
    }

    if(state === 'done'){
        await botSay('Want to start again?');
        showServiceGrid();
        state = 'menu';
        return;
    }

async function pollPayment(paymentId){
    const maxAttempts = 120; // 30 min (every 15s)
    for(let i=0;i<maxAttempts;i++){
        await delay(15000);
        try {
            const res = await fetch('/api/pay/status',{
                method:'POST',headers:{'Content-Type':'application/json'},
                body:JSON.stringify({paymentId})
            });
            const d = await res.json();
            const statusEl = document.getElementById('payStatus');
            const progressEl = document.getElementById('payProgress');
            
            if(d.status === 'paid' || d.status === 'fulfilled' || d.status === 'paid_waiting'){
                if(statusEl) statusEl.innerHTML = '✅ Payment confirmed!';
                if(progressEl) progressEl.style.width = '100%';
                addSystem('PAYMENT CONFIRMED — TX: '+(d.txSignature||'').slice(0,16)+'...');
                await botSay('✅ <b>Payment received!</b>');
                if(d.orderId){
                    await delay(1000);
                    await botSay('📦 Order <b>#'+d.orderId+'</b> — delivering!');
                } else {
                    await delay(500);
                    await botSay('📦 Your order has been saved and will be delivered very soon! Thanks 🙏');
                }
                await delay(1000);
                await botSay('Want something else?');
                showServiceGrid();
                state='menu';
                return;
            }
            if(d.status === 'expired'){
                if(statusEl) statusEl.innerHTML = '⏰ Payment expired.';
                addSystem('PAYMENT EXPIRED');
                await botSay('⏰ Payment expired (30 min). Try again if you want.');
                showServiceGrid();
                state='menu';
                return;
            }
            if(d.status === 'error'){
                if(statusEl) statusEl.innerHTML = '❌ Error';
                await botSay('❌ There was an error with your order. Contact @SeldiCucci on Telegram.');
                state='done';
                return;
            }
            // Still pending
            const pct = Math.min(5 + i*2, 90);
            if(progressEl) progressEl.style.width = pct+'%';
            if(statusEl && i%4===0) statusEl.innerHTML = '⏳ Scanning blockchain... ('+Math.floor(i*15/60)+'min)';
        } catch(e){}
    }
    await botSay('⏰ Timeout. If you already paid, contact @SeldiCucci on Telegram.');
    state='done';
}

(function(){
    const c = document.getElementById('matrix');
    const ctx = c.getContext('2d');
    let w, h, cols, drops;
    const chars = 'ᚠᚡᚢᚣᚤᚥᚦᚧᚨᚩᚪᚫᚬᚭ01アイウエオカキクケコ';
    
    function resize(){
        w = c.width = window.innerWidth;
        h = c.height = window.innerHeight;
        cols = Math.floor(w / 14);
        drops = Array(cols).fill(1);
    }
    resize();
    window.addEventListener('resize', resize);
    
    function draw(){
        ctx.fillStyle = 'rgba(10,10,10,0.08)';
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = '#00ff41';
        ctx.font = '12px monospace';
        
        for(let i = 0; i < cols; i++){
            const char = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(char, i * 14, drops[i] * 14);
            if(drops[i] * 14 > h && Math.random() > 0.975){
                drops[i] = 0;
            }
            drops[i]++;
        }
    }
    setInterval(draw, 60);
